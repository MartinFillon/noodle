name: pipeline
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: test
        uses: freckle/stack-action@v5

  formatting:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: format
        uses: haskell-actions/run-fourmolu@v12
        with:
          version: "0.14.1.0"

  linting:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: lint
        uses: haskell-actions/hlint-run@v2.4.10
        with:
          path: "src"
