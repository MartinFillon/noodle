on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Haskell
        uses: haskell-actions/setup@v2.10.3
        with:
          ghc-version: 9.6
          cabal-version: 3.12
          stack-version: 3.3
      - name: Build
        run: stack build

      - name: Test
        run: stack test
